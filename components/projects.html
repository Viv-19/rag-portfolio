<!-- Section: Projects / Build Layer -->
<section id="projects" class="agent-section projects-section hidden">
    <div class="projects-section-inner">
        <div class="section-header">
            <span class="agent-log">&gt; Agent compiling key builds...</span>
        </div>

        <div class="projects-cluster">
            <p id="projects-hint" class="projects-hint">Click on the pic to see the projects</p>

            <div class="projects-stage">
                <div id="projects-hub" class="projects-hub">
                    <button
                        type="button"
                        id="projects-core-btn"
                        class="projects-core"
                        aria-label="Toggle project cards"
                        aria-expanded="false"
                    >
                        <img
                            src="assets/project%20image.png"
                            alt="Developer at work — click to explore projects"
                            class="projects-core-image"
                            width="560"
                            height="560"
                        />
                    </button>

                    <div id="projects-spokes" class="projects-spokes" aria-live="polite"></div>
                </div>
            </div>

            <footer class="projects-footer">
                <a
                    id="projects-github-link"
                    class="projects-github-cta"
                    href="https://github.com/Viv-19"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    More projects on GitHub &rarr;
                </a>
            </footer>
        </div>
    </div>
</section>
