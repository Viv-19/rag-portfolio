<div id="chatbot-container">
    <!-- Floating button -->
    <button id="chatbot-toggle-btn" aria-label="Toggle AI Assistant" class="glow-effect floating-btn">
        <img src="assets/chatbot_logo.png" alt="Chatbot Logo" class="chatbot-logo-img">
    </button>

    <!-- Chat Window -->
    <div id="chatbot-window" class="chatbot-hidden">
        <div class="chatbot-header">
            <div class="chatbot-title">
                <span class="status-dot pulsing"></span>
                <span>Agentic Assistant</span>
            </div>
            <button id="chatbot-close-btn" aria-label="Close Chat">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div id="chatbot-messages" class="chatbot-messages">
            <div class="message-row">
                <img src="assets/chatbot_logo.png" class="message-avatar" alt="AI">
                <div class="message ai-message">
                    <p>System initialized. Ask me anything about Vivesh's portfolio, projects, or experience.</p>
                </div>
            </div>
        </div>
        <form id="chatbot-form" class="chatbot-input-area">
            <input type="text" id="chatbot-input" placeholder="Query agent..." autocomplete="off" required>
            <button type="submit" id="chatbot-submit" aria-label="Send">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>
</div>
